workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m1 # Android 也可以在 Mac 环境打包，或者改用 linux 实例
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build APK
        script: |
          # 构建 Release 版本的 APK
          # split-per-abi 可以减少单个 APK 的体积，分别生成 arm64, arm-v7a 等
          flutter build apk --release --split-per-abi
      - name: Flutter build App Bundle
        script: |
          # 构建用于上架 Google Play 的 .aab 文件
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - 1575214258@qq.com

  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build iOS
        script: |
          # 使用 build ipa 代替 build ios，这是目前 Flutter 推荐的打包方式
          # 如果你配置了代码签名，请移除 --no-codesign
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/*.app
      - build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - 1575214258@qq.com
