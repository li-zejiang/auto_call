workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m1 # Android 也可以在 Mac 环境打包，或者改用 linux 实例
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build APK
        script: |
          # 构建 Release 版本的 APK
          # split-per-abi 可以减少单个 APK 的体积，分别生成 arm64, arm-v7a 等
          flutter build apk --release --split-per-abi
      - name: Flutter build App Bundle
        script: |
          # 构建用于上架 Google Play 的 .aab 文件
          flutter build appbundle --release
    artifacts:
      - "build/app/outputs/flutter-apk/*.apk"
      - "build/app/outputs/bundle/release/*.aab"
    publishing:         
      email:
        recipients:
          - 1575214258@qq.com

  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build iOS
        script: |
          # 构建无签名的 iOS 产物 (.app)
          flutter build ios --release --no-codesign
      - name: Package IPA for manual signing
        script: |
          # 确保清理旧数据并创建标准 Payload 结构
          rm -rf Payload Runner.ipa
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          # 必须在包含 Payload 的目录下进行压缩
          zip -r Runner.ipa Payload
    artifacts:
      - "*.ipa"
      - "build/ios/iphoneos/*.app"
    publishing:
      email:
        recipients:
          - 1575214258@qq.com
