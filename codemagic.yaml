workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m1 # Android 也可以在 Mac 环境打包，或者改用 linux 实例
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build APK
        script: |
          # 构建 Release 版本的 APK
          # split-per-abi 可以减少单个 APK 的体积，分别生成 arm64, arm-v7a 等
          flutter build apk --release --split-per-abi
      - name: Flutter build App Bundle
        script: |
          # 构建用于上架 Google Play 的 .aab 文件
          flutter build appbundle --release
    artifacts:
      - "build/app/outputs/flutter-apk/*.apk"
      - "build/app/outputs/bundle/release/*.aab"
    publishing:         
      email:
        recipients:
          - 1575214258@qq.com

  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build iOS
        script: |
          # 构建无签名的 iOS 产物 (.app)
          flutter build ios --release --no-codesign
      - name: Package IPA for manual signing
        script: |
          # 1. 清理环境
          rm -rf Payload Runner.ipa
          # 2. 创建标准的 Payload 目录
          mkdir -p Payload
          # 3. 使用 -L 参数强制跟随软链接，将所有内容作为真实文件复制
          cp -RL build/ios/iphoneos/Runner.app Payload/
          # 4. 确保权限正确，避免签名工具因权限问题报错
          chmod -R 755 Payload/Runner.app
          # 5. 使用 -y 参数保留 zip 中的链接属性（虽然我们已经用了 cp -L，但这是双重保险）
          zip -r -y Runner.ipa Payload
    artifacts:
      - "*.ipa"
      - "build/ios/iphoneos/*.app"
    publishing:
      email:
        recipients:
          - 1575214258@qq.com
